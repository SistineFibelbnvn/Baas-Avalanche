server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 1. Docker container logs discovery
  # Uses mounted /var/run/docker.sock (from docker-compose volume mount)
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: logstream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - target_label: job
        replacement: containerlogs
    pipeline_stages:
      - docker: {}

  # 2. Monitoring stack containers (prometheus, grafana, loki, alertmanager)
  - job_name: monitoring
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["avalanche-prometheus", "avalanche-grafana", "avalanche-loki", "avalanche-alertmanager"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - target_label: job
        replacement: monitoring
    pipeline_stages:
      - docker: {}

  # 3. Backend application logs via HTTP push (push API)
  # The NestJS backend can push logs to Loki via HTTP API
  # No file scraping needed — the backend pushes directly
