services:
  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: avalanche-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: avalanche-grafana
    ports:
      - "3010:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    depends_on:
      - prometheus
      - loki
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Loki - Log Aggregation (like ELK but lightweight)
  loki:
    image: grafana/loki:3.0.0
    container_name: avalanche-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # Promtail - Log Shipper to Loki
  promtail:
    image: grafana/promtail:3.0.0
    container_name: avalanche-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      # Docker socket for container log discovery (works on Windows Docker Desktop)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Alertmanager - Alert Handling
  alertmanager:
    image: prom/alertmanager:latest
    container_name: avalanche-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

  # Node Exporter - System Metrics (CPU, Memory, Disk)
  # NOTE: On Windows Docker Desktop, run with: docker compose --profile linux up -d
  # Default docker compose up (no profile) will skip this service on Windows
  node-exporter:
    image: prom/node-exporter:latest
    container_name: avalanche-node-exporter
    ports:
      - "9100:9100"
    # Windows Docker Desktop compatible: no Linux-specific volume mounts
    command:
      - '--web.listen-address=:9100'
    restart: unless-stopped
    profiles:
      - linux

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  alertmanager-data:
