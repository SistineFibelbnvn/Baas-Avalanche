server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs via Docker Engine TCP (Windows Docker Desktop compatible)
  - job_name: containers
    docker_sd_configs:
      - host: tcp://host.docker.internal:2375
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: logstream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - target_label: job
        replacement: containerlogs
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: msg
            timestamp: time
      - labels:
          level:

  # Avalanche node containers
  - job_name: avalanche
    docker_sd_configs:
      - host: tcp://host.docker.internal:2375
        refresh_interval: 5s
        filters:
          - name: name
            values: ["avax-*", "avalanche-cli"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - target_label: job
        replacement: avalanche
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: msg
      - labels:
          level:
