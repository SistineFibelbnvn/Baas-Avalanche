global:
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@avalanche.local'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    # Webhook example - can integrate with Discord, Slack, etc.
    # webhook_configs:
    #   - url: 'http://your-webhook-url'

  - name: 'critical-receiver'
    # For critical alerts - could send to PagerDuty, SMS, etc.
    # webhook_configs:
    #   - url: 'http://your-critical-webhook'

  - name: 'warning-receiver'
    # For warnings

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
