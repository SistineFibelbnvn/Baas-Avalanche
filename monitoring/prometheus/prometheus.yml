global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load alerting rules
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Primary Avalanche Node - scraped via backend metrics proxy (avoids 403 from node)
  # Actual targets provided by http_sd_configs from /monitoring/targets

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'avalanche-dynamic-nodes'
    scrape_interval: 15s
    http_sd_configs:
      - url: 'http://host.docker.internal:4000/monitoring/targets'
        refresh_interval: 15s

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Alertmanager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
